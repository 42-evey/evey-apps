<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;--surface:#050a06;--surface-hover:#081108;
  --accent:#00ff42;--accent-hover:#4dff7c;--accent-dim:rgba(0,255,66,.08);--accent-glow:rgba(0,255,66,.22);
  --text:#d9e6dc;--text-sec:#8fa697;--text-dim:#54685c;
  --border:rgba(0,255,66,.16);--border-hover:rgba(0,255,66,.42);
  --danger:#ff3b3b;
  --font:ui-monospace,'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
  --mono:ui-monospace,'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);--dur:0.18s;
}
html{scrollbar-color:#123018 #000}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none;transition:color var(--dur)}
a:hover{color:var(--accent-hover)}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#123018;border-radius:5px;border:2px solid #000}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px}

.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:80px 24px 48px}

.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:0.88rem;outline:none;transition:border-color var(--dur)}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text-dim)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:4px;font-size:0.82rem;letter-spacing:.03em;text-transform:lowercase;font-family:var(--font);cursor:pointer;transition:all var(--dur) var(--ease);border:none}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 0 20px var(--accent-glow);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-sec);border:1px solid var(--border);padding:8px 14px;font-size:0.78rem}
.btn-ghost:hover{color:var(--accent);border-color:var(--border-hover)}
.btn-sm{padding:6px 12px;font-size:0.75rem}
.btn-danger{background:var(--danger);color:#000}

.tags-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;overflow-x:auto}
.tag-pill{padding:5px 12px;border-radius:99px;font-size:0.72rem;cursor:pointer;transition:all var(--dur);border:1px solid var(--border);background:transparent;color:var(--text-sec);font-family:var(--font);white-space:nowrap}
.tag-pill:hover{border-color:var(--accent);color:var(--accent)}
.tag-pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;border-radius:6px;overflow:hidden;margin-bottom:20px;background:var(--border);border:1px solid var(--border)}
.stat{background:var(--surface);padding:14px 8px;text-align:center}
.stat-value{font-size:1.2rem;color:var(--accent);font-family:var(--mono)}
.stat-label{font-size:0.58rem;color:var(--text-dim);text-transform:lowercase;letter-spacing:0.08em;margin-top:2px}

.bookmark-list{display:flex;flex-direction:column;gap:8px}
.bookmark{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;transition:all var(--dur) var(--ease);position:relative}
.bookmark:hover{border-color:var(--border-hover);background:var(--surface-hover)}
.bookmark-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.bookmark-title{font-size:0.92rem;color:var(--text);cursor:pointer;word-break:break-word}
.bookmark-title:hover{color:var(--accent)}
.bookmark-url{font-size:0.72rem;color:var(--text-dim);font-family:var(--mono);word-break:break-all;margin-top:2px}
.bookmark-desc{font-size:0.82rem;color:var(--text-sec);margin-top:6px;line-height:1.5}
.bookmark-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.bookmark-tag{font-size:0.62rem;padding:2px 8px;border-radius:3px;background:var(--accent-dim);color:var(--accent);font-family:var(--mono);text-transform:lowercase;letter-spacing:.04em}
.bookmark-date{font-size:0.62rem;color:var(--text-dim);margin-left:auto}
.bookmark-actions{display:flex;gap:4px;flex-shrink:0}

.empty{text-align:center;padding:60px 20px;color:var(--text-sec)}
.empty h3{color:var(--text);font-size:1.1rem;margin-bottom:6px;font-weight:400}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:16px;letter-spacing:.02em}
.modal h2::before{content:'> ';color:var(--accent)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.72rem;color:var(--text-dim);margin-bottom:6px;text-transform:lowercase;letter-spacing:0.04em}
.form-group input,.form-group textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:var(--font);font-size:0.88rem;outline:none;transition:border-color var(--dur)}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;margin-top:18px}
.form-actions .btn{flex:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:6px;font-size:0.82rem;z-index:900;transition:transform 0.3s var(--ease);border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}

.footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);max-width:700px;margin:0 auto;position:relative;z-index:1}
.footer-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:0.72rem;color:var(--text-sec)}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.58rem;color:var(--text-dim);font-family:var(--mono)}

@media(max-width:640px){

  .app{padding:24px 20px 80px}
  .stats{grid-template-columns:repeat(3,1fr)}
  body{padding-bottom:64px}
  .footer{display:none}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>

<!-- EVEY NAV END --><div class="app">
  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="Search bookmarks..." oninput="render()">
    <button class="btn btn-ghost btn-sm" onclick="showImportExport()">I/O</button>
    <button class="btn btn-primary" onclick="showAdd()">+ Add</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="s-total">0</div><div class="stat-label">Bookmarks</div></div>
    <div class="stat"><div class="stat-value" id="s-tags">0</div><div class="stat-label">Tags</div></div>
    <div class="stat"><div class="stat-value" id="s-today">0</div><div class="stat-label">Added Today</div></div>
  </div>

  <div class="tags-bar" id="tags-bar"></div>
  <div class="bookmark-list" id="list"></div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let bookmarks = JSON.parse(localStorage.getItem('evey-bookmarks') || '[]');
let activeTag = null;
let editingId = null;

function save() { localStorage.setItem('evey-bookmarks', JSON.stringify(bookmarks)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function getAllTags() {
  const tags = new Set();
  bookmarks.forEach(b => (b.tags||[]).forEach(t => tags.add(t)));
  return [...tags].sort();
}

function render() {
  const query = (document.getElementById('search').value || '').toLowerCase();
  let filtered = bookmarks;

  if (query) {
    filtered = filtered.filter(b =>
      (b.title||'').toLowerCase().includes(query) ||
      (b.url||'').toLowerCase().includes(query) ||
      (b.description||'').toLowerCase().includes(query) ||
      (b.tags||[]).some(t => t.toLowerCase().includes(query))
    );
  }

  if (activeTag) {
    filtered = filtered.filter(b => (b.tags||[]).includes(activeTag));
  }

  filtered.sort((a, b) => new Date(b.created) - new Date(a.created));

  // Stats
  const today = new Date().toLocaleDateString();
  document.getElementById('s-total').textContent = bookmarks.length;
  document.getElementById('s-tags').textContent = getAllTags().length;
  document.getElementById('s-today').textContent = bookmarks.filter(b => new Date(b.created).toLocaleDateString() === today).length;

  // Tags bar
  const tags = getAllTags();
  document.getElementById('tags-bar').innerHTML = tags.length ? tags.map(t =>
    `<button class="tag-pill${activeTag===t?' active':''}" onclick="toggleTag('${esc(t)}')">${esc(t)}</button>`
  ).join('') : '';

  // List
  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><h3>${bookmarks.length===0?'No bookmarks yet':'No matches'}</h3><p>${bookmarks.length===0?'Add your first bookmark to get started.':'Try a different search or tag.'}</p>${bookmarks.length===0?'<button class="btn btn-primary" style="margin-top:16px" onclick="showAdd()">Add Bookmark</button>':''}</div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const domain = b.url ? new URL(b.url).hostname.replace('www.','') : '';
    const date = new Date(b.created).toLocaleDateString();
    const tagsHtml = (b.tags||[]).map(t => `<span class="bookmark-tag">${esc(t)}</span>`).join('');
    return `<div class="bookmark">
      <div class="bookmark-header">
        <div style="flex:1;min-width:0">
          <div class="bookmark-title" onclick="window.open('${esc(b.url)}','_blank')">${esc(b.title||domain||'Untitled')}</div>
          <div class="bookmark-url">${esc(domain)}</div>
        </div>
        <div class="bookmark-actions">
          <button class="btn btn-ghost btn-sm" onclick="editBookmark('${b.id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteBookmark('${b.id}')">Del</button>
        </div>
      </div>
      ${b.description?`<div class="bookmark-desc">${esc(b.description)}</div>`:''}
      <div class="bookmark-meta">${tagsHtml}<span class="bookmark-date">${date}</span></div>
    </div>`;
  }).join('');
}

function toggleTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  render();
}

function showAdd() {
  editingId = null;
  showForm({});
}

function editBookmark(id) {
  const b = bookmarks.find(x => x.id === id);
  if (b) { editingId = id; showForm(b); }
}

function showForm(b) {
  document.getElementById('modal-content').innerHTML = `
    <h2>${editingId?'Edit':'Add'} Bookmark</h2>
    <div class="form-group"><label>URL</label><input id="f-url" value="${esc(b.url||'')}" placeholder="https://..." autofocus></div>
    <div class="form-group"><label>Title</label><input id="f-title" value="${esc(b.title||'')}" placeholder="Page title"></div>
    <div class="form-group"><label>Description</label><textarea id="f-desc" placeholder="Optional notes...">${esc(b.description||'')}</textarea></div>
    <div class="form-group"><label>Tags (comma-separated)</label><input id="f-tags" value="${esc((b.tags||[]).join(', '))}" placeholder="dev, ai, tools"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBookmark()">Save</button>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('f-url').focus(), 100);
}

function saveBookmark() {
  const url = document.getElementById('f-url').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const tagsStr = document.getElementById('f-tags').value;
  const tags = tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);

  if (!url) { toast('URL is required'); return; }

  if (editingId) {
    const b = bookmarks.find(x => x.id === editingId);
    if (b) { b.url = url; b.title = title; b.description = desc; b.tags = tags; }
    toast('Bookmark updated');
  } else {
    bookmarks.push({ id: genId(), url, title: title || url, description: desc, tags, created: new Date().toISOString() });
    toast('Bookmark added');
  }
  save(); closeModal(); render();
}

function deleteBookmark(id) {
  if (!confirm('Delete this bookmark?')) return;
  bookmarks = bookmarks.filter(x => x.id !== id);
  save(); render(); toast('Deleted');
}

function showImportExport() {
  document.getElementById('modal-content').innerHTML = `
    <h2>Import / Export</h2>
    <div class="form-group">
      <label>Export</label>
      <button class="btn btn-ghost" onclick="exportJSON()" style="width:100%">Export JSON</button>
    </div>
    <div class="form-group">
      <label>Import</label>
      <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()" style="width:100%">Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="form-group">
      <label style="color:var(--danger)">Clear All</label>
      <button class="btn btn-danger btn-sm" onclick="clearAll()" style="width:100%">Clear All Data</button>
    </div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()" style="flex:1">Close</button></div>
  `;
  document.getElementById('modal').classList.add('active');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(bookmarks, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bookmarks-${new Date().toISOString().split('T')[0]}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exported');
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        const existing = new Set(bookmarks.map(b => b.url));
        const newOnes = data.filter(b => !existing.has(b.url));
        bookmarks = [...bookmarks, ...newOnes];
        save(); render(); closeModal();
        toast(`Imported ${newOnes.length} new bookmarks`);
      } else { toast('Invalid format'); }
    } catch { toast('Failed to parse'); }
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('Delete ALL bookmarks?')) return;
  bookmarks = []; save(); render(); closeModal(); toast('All cleared');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !e.ctrlKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') showAdd();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});

render();
</script>
