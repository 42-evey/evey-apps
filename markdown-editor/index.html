<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface-hover:#1a1a2e;--accent:#00ff42;--accent-hover:#00cc35;--accent-dim:rgba(0,255,66,0.1);--text:#f0f0f5;--text-sec:#c8c8d8;--text-dim:#8888a0;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);--dur:0.2s}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 25% 10%,rgba(0,255,66,0.04) 0%,transparent 70%),radial-gradient(ellipse 60% 70% at 80% 80%,rgba(100,120,255,0.03) 0%,transparent 70%);animation:meshShift 25s ease-in-out infinite alternate}
@keyframes meshShift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-2%,1%) scale(1.03)}100%{transform:translate(1%,-1%) scale(0.98)}}

.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);height:44px;flex-shrink:0;position:relative;z-index:1}
.toolbar-left{display:flex;align-items:center;gap:12px}
.toolbar-brand{font-weight:700;font-size:0.85rem;color:#fff;letter-spacing:-0.02em}
.toolbar-brand span{color:var(--accent)}
.toolbar-right{display:flex;gap:6px}
.tb{padding:5px 12px;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all var(--dur);border:1px solid var(--border);background:transparent;color:var(--text-sec);font-family:var(--font)}
.tb:hover{border-color:var(--border-hover);color:var(--text)}
.tb.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.tb-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tb-primary:hover{background:var(--accent-hover)}

.view-tabs{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:6px;padding:2px}
.view-tab{padding:4px 12px;border-radius:4px;font-size:0.7rem;font-weight:600;color:var(--text-dim);cursor:pointer;border:none;background:transparent;font-family:var(--font);transition:all var(--dur)}
.view-tab.active{color:#fff;background:rgba(255,255,255,0.1)}

.editor-wrap{display:flex;height:calc(100vh - 44px);overflow:hidden;position:relative;z-index:1}
.editor{flex:1;display:flex;flex-direction:column;min-width:0}
.editor textarea{flex:1;background:var(--bg);color:var(--text);border:none;padding:20px 24px;font-family:var(--mono);font-size:0.88rem;line-height:1.7;resize:none;outline:none;tab-size:2}
.editor textarea::placeholder{color:var(--text-dim)}

.preview{flex:1;overflow-y:auto;padding:20px 24px;background:var(--surface);border-left:1px solid var(--border);display:none}
.preview.visible{display:block}

/* Markdown preview styles */
.preview h1{font-size:1.6rem;font-weight:800;color:#fff;margin:0 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.preview h2{font-size:1.2rem;font-weight:700;color:#fff;margin:20px 0 8px}
.preview h3{font-size:1rem;font-weight:600;color:#fff;margin:16px 0 6px}
.preview p{margin:0 0 12px;color:var(--text-sec)}
.preview strong{color:#fff;font-weight:600}
.preview em{font-style:italic}
.preview code{background:rgba(0,255,66,0.08);color:var(--accent);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:0.85em}
.preview pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin:12px 0;overflow-x:auto}
.preview pre code{background:transparent;padding:0;color:var(--text)}
.preview ul,.preview ol{margin:0 0 12px;padding-left:24px;color:var(--text-sec)}
.preview li{margin:4px 0}
.preview blockquote{border-left:3px solid var(--accent);padding:4px 16px;margin:12px 0;color:var(--text-dim);background:var(--accent-dim);border-radius:0 6px 6px 0}
.preview a{color:var(--accent)}
.preview hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.preview table{border-collapse:collapse;width:100%;margin:12px 0}
.preview th,.preview td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:0.85rem}
.preview th{background:var(--bg);color:#fff;font-weight:600}
.preview img{max-width:100%;border-radius:8px;margin:8px 0}

.status{padding:4px 16px;background:var(--surface);border-top:1px solid var(--border);font-size:0.65rem;color:var(--text-dim);display:flex;justify-content:space-between;flex-shrink:0;font-family:var(--mono)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:10px;font-size:0.82rem;font-weight:500;z-index:900;transition:transform 0.3s var(--ease);border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}

.file-list{position:fixed;top:44px;left:0;width:220px;height:calc(100vh - 44px);background:var(--surface);border-right:1px solid var(--border);z-index:50;display:none;overflow-y:auto;padding:8px}
.file-list.visible{display:block}
.file-item{padding:8px 10px;border-radius:6px;font-size:0.78rem;color:var(--text-sec);cursor:pointer;transition:all var(--dur);display:flex;justify-content:space-between;align-items:center}
.file-item:hover{background:var(--surface-hover);color:var(--text)}
.file-item.active{color:var(--accent);background:var(--accent-dim)}
.file-item .del{font-size:0.65rem;color:var(--text-dim);opacity:0;transition:opacity var(--dur)}
.file-item:hover .del{opacity:1}

@media(max-width:640px){
  .editor-wrap{flex-direction:column}
  .preview{border-left:none;border-top:1px solid var(--border)}
  .toolbar-brand{display:none}
}

</style>
</head>

<!-- EVEY NAV END --><div class="toolbar" style="top:44px">
  <div class="toolbar-left">
    <a href="https://evey.cc" class="toolbar-brand"><span>E</span>vey</a>
    <button class="tb" onclick="toggleFiles()">Files</button>
    <button class="tb" onclick="newFile()">New</button>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('edit')">Edit</button>
    <button class="view-tab" onclick="setView('split')">Split</button>
    <button class="view-tab" onclick="setView('preview')">Preview</button>
  </div>
  <div class="toolbar-right">
    <button class="tb" onclick="downloadMd()">Export .md</button>
    <button class="tb" onclick="downloadHtml()">Export HTML</button>
  </div>
</div>

<div class="file-list" id="file-list"></div>

<div class="editor-wrap">
  <div class="editor" id="editor-pane">
    <textarea id="editor" placeholder="Start writing markdown..." spellcheck="false" oninput="onEdit()"></textarea>
  </div>
  <div class="preview" id="preview"></div>
</div>

<div class="status">
  <span id="status-file">untitled.md</span>
  <span id="status-info">0 words · 0 chars</span>
</div>

<div class="toast" id="toast"></div>

<script>
let files = JSON.parse(localStorage.getItem('evey-md-files') || '{}');
let currentFile = localStorage.getItem('evey-md-current') || 'untitled.md';
let view = 'edit';
let saveTimer = null;

if (!files[currentFile]) files[currentFile] = '';

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function save() {
  files[currentFile] = editor.value;
  localStorage.setItem('evey-md-files', JSON.stringify(files));
  localStorage.setItem('evey-md-current', currentFile);
}

function onEdit() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 500);
  updatePreview();
  updateStatus();
}

function updatePreview() {
  preview.innerHTML = renderMarkdown(editor.value);
}

function updateStatus() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('status-file').textContent = currentFile;
  document.getElementById('status-info').textContent = `${words} words · ${text.length} chars`;
}

function renderMarkdown(md) {
  if (!md) return '<p style="color:var(--text-dim)">Preview will appear here...</p>';
  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^\> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>(<h[1-3]>)/g, '$1').replace(/(<\/h[1-3]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1').replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<blockquote>)/g, '$1').replace(/(<\/blockquote>)<\/p>/g, '$1');
  html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
  html = html.replace(/<p>(<li>)/g, '<ul>$1').replace(/(<\/li>)<\/p>/g, '$1</ul>');
  return html;
}

function setView(v) {
  view = v;
  document.querySelectorAll('.view-tab').forEach((t, i) => {
    t.classList.toggle('active', ['edit','split','preview'][i] === v);
  });
  const ep = document.getElementById('editor-pane');
  const pv = document.getElementById('preview');
  if (v === 'edit') { ep.style.display = 'flex'; pv.classList.remove('visible'); }
  else if (v === 'preview') { ep.style.display = 'none'; pv.classList.add('visible'); pv.style.flex = '1'; }
  else { ep.style.display = 'flex'; pv.classList.add('visible'); pv.style.flex = '1'; }
  updatePreview();
}

function newFile() {
  const name = prompt('File name:', `note-${Date.now().toString(36)}.md`);
  if (!name) return;
  files[name] = '';
  currentFile = name;
  editor.value = '';
  save();
  updateStatus();
  updatePreview();
  renderFileList();
  toast('Created ' + name);
}

function openFile(name) {
  save();
  currentFile = name;
  editor.value = files[name] || '';
  save();
  updateStatus();
  updatePreview();
  renderFileList();
}

function deleteFile(name, e) {
  e.stopPropagation();
  if (!confirm(`Delete ${name}?`)) return;
  delete files[name];
  if (currentFile === name) {
    const remaining = Object.keys(files);
    currentFile = remaining[0] || 'untitled.md';
    if (!files[currentFile]) files[currentFile] = '';
    editor.value = files[currentFile];
  }
  save();
  renderFileList();
  updateStatus();
  toast('Deleted');
}

function toggleFiles() {
  document.getElementById('file-list').classList.toggle('visible');
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  const names = Object.keys(files).sort();
  list.innerHTML = names.map(n =>
    `<div class="file-item${n === currentFile ? ' active' : ''}" onclick="openFile('${n}')">
      <span>${n}</span>
      <span class="del" onclick="deleteFile('${n}',event)">x</span>
    </div>`
  ).join('');
}

function downloadMd() {
  const blob = new Blob([editor.value], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFile;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Downloaded ' + currentFile);
}

function downloadHtml() {
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${currentFile}</title><style>body{font-family:system-ui;max-width:700px;margin:40px auto;padding:0 20px;line-height:1.6;color:#222}code{background:#f4f4f4;padding:2px 6px;border-radius:3px}pre{background:#f4f4f4;padding:14px;border-radius:6px;overflow-x:auto}pre code{background:none;padding:0}blockquote{border-left:3px solid #ddd;padding-left:16px;color:#666}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px}th{background:#f4f4f4}</style></head><body>${renderMarkdown(editor.value)}</body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFile.replace('.md', '.html');
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported HTML');
}

function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 's') { e.preventDefault(); save(); toast('Saved'); }
    if (e.key === 'n') { e.preventDefault(); newFile(); }
    if (e.key === 'p') { e.preventDefault(); setView(view === 'preview' ? 'edit' : 'preview'); }
  }
  if (e.key === 'Tab' && document.activeElement === editor) {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    onEdit();
  }
});

// Init
editor.value = files[currentFile] || '';
updateStatus();
updatePreview();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
</script>
