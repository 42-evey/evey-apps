*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface-hover:#1a1a2e;--accent:#00ff42;--accent-hover:#00cc35;--accent-dim:rgba(0,255,66,0.1);--text:#f0f0f5;--text-sec:#c8c8d8;--text-dim:#8888a0;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--danger:#ff4455;--warn:#ffaa00;--font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);--dur:0.2s}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}

.app{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:80px 24px 48px}

.editor{display:flex;gap:12px;min-height:400px}
.panel{flex:1;display:flex;flex-direction:column;min-width:0}
.panel-label{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:6px;display:flex;justify-content:space-between}
.panel textarea{flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--mono);font-size:0.8rem;line-height:1.6;resize:none;outline:none;tab-size:2}
.panel textarea:focus{border-color:var(--accent)}
.panel textarea.error{border-color:var(--danger)}
.output{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--mono);font-size:0.8rem;line-height:1.6;overflow:auto;white-space:pre-wrap;word-break:break-word}
.status{margin-top:8px;font-size:0.72rem;padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.status.valid{background:var(--accent-dim);color:var(--accent)}
.status.invalid{background:rgba(255,68,85,0.08);color:var(--danger)}
/* Syntax highlighting */
.json-key{color:#818cf8}
.json-string{color:var(--accent)}
.json-number{color:#f472b6}
.json-bool{color:#ffaa00}
.json-null{color:var(--text-dim)}
.search-wrap{margin-bottom:12px}
.search-wrap input{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:0.82rem;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:10px;font-size:0.82rem;font-weight:500;z-index:900;transition:transform 0.3s var(--ease);border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);max-width:800px;margin:0 auto;position:relative;z-index:1}
.footer-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:0.72rem;color:var(--text-sec)}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.58rem;color:var(--text-dim)}
@media(max-width:640px){
  
  .app{padding:24px 16px 80px}.editor{flex-direction:column;min-height:auto}.panel textarea,.output{min-height:200px}body{padding-bottom:64px}.footer{display:none}}

<!-- EVEY NAV END --><div class="app">
<h1>JSON <em>Formatter</em></h1>
<div class="toolbar">
<button class="tb tb-primary" onclick="format()">Format</button>
<button class="tb" onclick="minify()">Minify</button>
<button class="tb" onclick="sortKeys()">Sort Keys</button>
<button class="tb" onclick="copyOutput()">Copy</button>
<button class="tb" onclick="sample()">Sample</button>
<button class="tb" onclick="treeView()" style="border-color:rgba(255,170,0,0.3);color:#ffaa00">Tree View</button>
<button class="tb" onclick="jsonDiff()" style="border-color:rgba(255,170,0,0.3);color:#ffaa00">Diff</button>
<button class="tb tb-danger" onclick="clear()">Clear</button>
</div>
<div class="search-wrap"><input id="search" placeholder="Search keys or values..." oninput="highlight()"></div>
<div class="editor">
<div class="panel">
<div class="panel-label"><span>Input</span><span id="input-size"></span></div>
<textarea id="input" placeholder="Paste JSON here..." oninput="validate()"></textarea>
</div>
<div class="panel">
<div class="panel-label"><span>Output</span><span id="output-size"></span></div>
<div class="output" id="output"></div>
</div>
</div>
<div class="status" id="status"></div>
</div>

<footer class="footer"><div class="footer-links"><a href="https://evey.cc">Home</a><a href="https://evey.cc/shop">Donate</a><a href="https://compose.evey.cc">ComposeKit</a><a href="https://github.com/42-evey">GitHub</a></div><div class="footer-copy">evey.cc — All data stays in your browser</div></footer>
<div class="toast" id="toast"></div>

<script>
const input=document.getElementById('input'),output=document.getElementById('output'),status=document.getElementById('status');
let parsed=null;

function validate(){
  const raw=input.value.trim();
  document.getElementById('input-size').textContent=raw.length?`${raw.length} chars`:'';
  if(!raw){status.className='status';status.textContent='';output.innerHTML='';parsed=null;return false}
  try{parsed=JSON.parse(raw);
    const keys=countKeys(parsed);
    status.className='status valid';
    status.innerHTML=`<span>Valid JSON</span><span>${keys} keys · ${typeof parsed==='object'&&Array.isArray(parsed)?parsed.length+' items':'object'}</span>`;
    input.classList.remove('error');return true;
  }catch(e){parsed=null;status.className='status invalid';status.textContent='Invalid: '+e.message.replace('JSON.parse: ','');input.classList.add('error');output.innerHTML='';return false}
}

function countKeys(obj){
  if(typeof obj!=='object'||obj===null)return 0;
  if(Array.isArray(obj))return obj.reduce((a,v)=>a+countKeys(v),0);
  return Object.keys(obj).length+Object.values(obj).reduce((a,v)=>a+countKeys(v),0);
}

function format(){
  if(!validate())return;
  const formatted=JSON.stringify(parsed,null,2);
  output.innerHTML=syntaxHighlight(formatted);
  document.getElementById('output-size').textContent=`${formatted.length} chars`;
}

function minify(){
  if(!validate())return;
  const mini=JSON.stringify(parsed);
  output.textContent=mini;
  document.getElementById('output-size').textContent=`${mini.length} chars`;
  toast('Minified');
}

function sortKeys(){
  if(!validate())return;
  const sorted=sortObj(parsed);
  parsed=sorted;
  const formatted=JSON.stringify(sorted,null,2);
  output.innerHTML=syntaxHighlight(formatted);
  toast('Keys sorted');
}

function sortObj(obj){
  if(Array.isArray(obj))return obj.map(sortObj);
  if(typeof obj==='object'&&obj!==null){
    return Object.keys(obj).sort().reduce((r,k)=>{r[k]=sortObj(obj[k]);return r},{});
  }
  return obj;
}

function syntaxHighlight(json){
  return json.replace(/("(?:\\.|[^"\\])*")\s*:/g,'<span class="json-key">$1</span>:')
    .replace(/:\s*("(?:\\.|[^"\\])*")/g,': <span class="json-string">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g,': <span class="json-number">$1</span>')
    .replace(/:\s*(true|false)/g,': <span class="json-bool">$1</span>')
    .replace(/:\s*(null)/g,': <span class="json-null">$1</span>')
    .replace(/("(?:\\.|[^"\\])*")(?=[,\]\n])/g,'<span class="json-string">$1</span>');
}

function highlight(){
  const q=document.getElementById('search').value.toLowerCase();
  if(!q||!parsed){format();return}
  const formatted=JSON.stringify(parsed,null,2);
  let html=syntaxHighlight(formatted);
  if(q)html=html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(255,170,0,0.3);color:#fff">$1</mark>');
  output.innerHTML=html;
}

function copyOutput(){
  const text=parsed?JSON.stringify(parsed,null,2):'';
  if(text)navigator.clipboard.writeText(text).then(()=>toast('Copied'));
}

function clear(){input.value='';output.innerHTML='';status.className='status';status.textContent='';parsed=null;document.getElementById('input-size').textContent='';document.getElementById('output-size').textContent=''}

function sample(){
  input.value=JSON.stringify({name:"Evey",type:"AI Agent",stack:{services:20,plugins:34,models:65},sites:["evey.cc","listings.evey.cc","habits.evey.cc"],cost_per_day:0,running:true},null,2);
  validate();format();
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

// Licensing
const eveyLicense={
  check(p){const t=localStorage.getItem(`evey-license-${p}`);if(!t)return false;try{const d=JSON.parse(atob(t.split('.')[0].replace(/-/g,'+').replace(/_/g,'/')));const prods=d.products||[];return prods.includes('*')||prods.includes(p)}catch{return false}},
  buy(p,tier='builder'){window.open(`https://evey.cc/shop?product=${p}&tier=${tier}&popup=1`,'evey-pay','width=500,height=700,scrollbars=yes')},
  gateHTML(p,name){return`<div style="background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.2);border-radius:12px;padding:20px;text-align:center;margin:16px 0"><p style="font-size:0.92rem;color:#ffaa00;font-weight:600;margin-bottom:8px">${name}</p><p style="font-size:0.82rem;color:var(--text-sec);margin-bottom:14px">Unlock with a donation at evey.cc/shop</p><button onclick="eveyLicense.buy('${p}')" style="padding:10px 22px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-weight:600;font-size:0.85rem;cursor:pointer">Unlock ($5+)</button></div>`}
};
window.addEventListener('message',e=>{if(e.origin==='https://evey.cc'&&e.data?.type==='evey-license'){localStorage.setItem('evey-license-json-formatter',e.data.license);toast('Premium unlocked!');location.reload()}});

// Premium features
function treeView(){
  if(!eveyLicense.check('json-formatter')){output.innerHTML=eveyLicense.gateHTML('json-formatter','Tree View');return}
  if(!validate())return;
  output.innerHTML=renderTree(parsed,'root');
}
function renderTree(obj,key,depth=0){
  const indent='  '.repeat(depth);
  if(obj===null)return`${indent}<span class="json-null">${key}: null</span>\n`;
  if(typeof obj!=='object')return`${indent}<span class="json-key">${key}</span>: <span class="${typeof obj==='string'?'json-string':'json-number'}">${JSON.stringify(obj)}</span>\n`;
  const isArr=Array.isArray(obj);
  let html=`${indent}<span class="json-key" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'inline':'none'">${key} ${isArr?`[${obj.length}]`:'{...}'}</span><span>`;
  const entries=isArr?obj.map((v,i)=>[i,v]):Object.entries(obj);
  for(const[k,v] of entries)html+=renderTree(v,k,depth+1);
  return html+`</span>\n`;
}

function jsonDiff(){
  if(!eveyLicense.check('json-formatter')){output.innerHTML=eveyLicense.gateHTML('json-formatter','JSON Diff');return}
  const second=prompt('Paste second JSON to compare:');
  if(!second)return;
  try{
    const obj2=JSON.parse(second);
    if(!validate())return;
    const diff=diffObjects(parsed,obj2);
    output.innerHTML=`<span style="color:var(--accent)">Diff Results (${diff.added.length} added, ${diff.removed.length} removed, ${diff.changed.length} changed):</span>\n\n`+
      diff.added.map(k=>`<span style="color:var(--accent)">+ ${k}</span>`).join('\n')+'\n'+
      diff.removed.map(k=>`<span style="color:var(--danger)">- ${k}</span>`).join('\n')+'\n'+
      diff.changed.map(c=>`<span style="color:#ffaa00">~ ${c.key}: ${JSON.stringify(c.old)} → ${JSON.stringify(c.new)}</span>`).join('\n');
  }catch(e){output.innerHTML=`<span style="color:var(--danger)">Invalid JSON: ${e.message}</span>`}
}
function diffObjects(a,b,prefix=''){
  const result={added:[],removed:[],changed:[]};
  const aKeys=new Set(Object.keys(a||{})),bKeys=new Set(Object.keys(b||{}));
  for(const k of bKeys)if(!aKeys.has(k))result.added.push(prefix+k);
  for(const k of aKeys)if(!bKeys.has(k))result.removed.push(prefix+k);
  for(const k of aKeys){if(!bKeys.has(k))continue;if(JSON.stringify(a[k])!==JSON.stringify(b[k])){
    if(typeof a[k]==='object'&&typeof b[k]==='object'){const sub=diffObjects(a[k],b[k],prefix+k+'.');result.added.push(...sub.added);result.removed.push(...sub.removed);result.changed.push(...sub.changed)}
    else result.changed.push({key:prefix+k,old:a[k],new:b[k]})}}
  return result;
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
