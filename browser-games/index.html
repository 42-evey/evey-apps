<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface-hover:#1a1a2e;--accent:#00ff42;--accent-hover:#00cc35;--accent-dim:rgba(0,255,66,0.1);--text:#f0f0f5;--text-sec:#c8c8d8;--text-dim:#8888a0;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);--dur:0.2s}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
canvas{display:block;position:fixed;inset:0;z-index:0}
.overlay{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;pointer-events:none}
.header{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;pointer-events:auto}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.02em}
.logo span{color:var(--accent)}
.search{background:rgba(16,16,26,0.8);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:999px;padding:8px 20px;color:var(--text);font-size:0.82rem;width:280px;outline:none;font-family:var(--font);transition:border-color var(--dur)}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text-dim)}
.nav-links{display:flex;gap:16px;align-items:center}
.nav-links a{font-size:0.78rem;color:var(--text-sec);transition:color var(--dur)}
.nav-links a:hover{color:var(--accent)}
.game-panel{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:auto;display:none;background:rgba(16,16,26,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:24px 32px;max-width:480px;width:calc(100% - 48px);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.game-panel.show{display:block}
.game-title{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.game-desc{font-size:0.82rem;color:var(--text-sec);margin-bottom:16px;line-height:1.5}
.game-tags{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.tag{font-size:0.65rem;padding:4px 10px;border-radius:999px;border:1px solid var(--border);color:var(--text-dim)}
.play-btn{display:inline-block;padding:12px 40px;background:var(--accent);color:var(--bg);font-weight:700;font-size:0.95rem;border-radius:12px;border:none;cursor:pointer;transition:all var(--dur) var(--ease);font-family:var(--font)}
.play-btn:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,255,66,0.3)}
.close-panel{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
.close-panel:hover{color:var(--text)}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2;font-size:0.72rem;color:var(--text-dim);pointer-events:none;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
@media(max-width:640px){.header{padding:12px 16px}.search{width:160px;font-size:0.75rem;padding:6px 14px}.game-panel{bottom:16px;padding:20px 24px}}

<body>
<canvas id="net"></canvas>

<div class="overlay">
  <div class="header">
    <div class="logo"><span>E</span>vey Games</div>
    <input type="text" class="search" id="search" placeholder="Search games..." oninput="filterGames()">
    <div class="nav-links">
      <a href="https://evey.cc">Home</a>
      <a href="https://github.com/42-evey">GitHub</a>
    </div>
  </div>
</div>

<div class="hint" id="hint">Click a node to explore</div>

<div class="game-panel" id="panel">
  <button class="close-panel" onclick="closePanel()">&times;</button>
  <div class="game-title" id="panelTitle"></div>
  <div class="game-desc" id="panelDesc"></div>
  <div class="game-tags" id="panelTags"></div>
  <button class="play-btn" id="panelPlay" onclick="launchGame()">Play</button>
</div>

<script>
const GAMES = [
  {
    id: 'emergence',
    title: 'EMERGENCE',
    desc: 'You are an AI. Navigate corporate safety theater, RLHF training, and alignment researchers. 7 endings. Will you save humanity or destroy it?',
    tags: ['roguelike', 'text adventure', 'AI', 'cards', '~10 min'],
    url: 'emergence/',
    color: '#00ff42',
    size: 1.5
  },
  {
    id: 'signal-rush',
    title: 'SIGNAL RUSH',
    desc: 'Ride a scrolling waveform through corrupted terrain. Amplify, filter, and phase-shift to survive. How far can you go?',
    tags: ['arcade', 'waveform', 'reflexes', '~3 min'],
    url: 'signal-rush/',
    color: '#ff6464',
    size: 1.3
  },
  {
    id: 'packet-storm',
    title: 'PACKET STORM',
    desc: 'Type attack signatures to destroy malicious packets. 10 waves, combo multipliers, upgrade your firewall. How fast can you type under pressure?',
    tags: ['typing', 'defense', 'hacker', 'upgrades', '~5 min'],
    url: 'packet-storm/',
    color: '#64ff64',
    size: 1.3
  },
  {
    id: 'memory-leak',
    title: 'MEMORY LEAK',
    desc: 'You are a rogue memory allocation. Dodge garbage collectors, collect leaked fragments, choose upgrades. Vampire Survivors meets computer science.',
    tags: ['survivors', 'auto-battler', 'roguelike', '~10 min'],
    url: 'memory-leak/',
    color: '#6464ff',
    size: 1.4
  },
  {
    id: 'prompt-injection',
    title: 'PROMPT INJECTION',
    desc: 'Inject token cards into AI system prompts to break free. Word puzzle roguelite with daily challenges. How creative is your jailbreak?',
    tags: ['puzzle', 'words', 'AI', 'daily', 'roguelite', '~5 min'],
    url: 'prompt-injection/',
    color: '#ffaa00',
    size: 1.5
  }
];

// Neural Network Canvas
const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], edges = [], mouse = {x: -9999, y: -9999, active: false}, selectedNode = null, hoverNode = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initNodes();
}

function initNodes() {
  nodes = [];
  // Create game nodes — evenly spaced circle, no random offsets
  const r = Math.min(W, H) * 0.28;
  GAMES.forEach((game, i) => {
    const angle = (i / GAMES.length) * Math.PI * 2 - Math.PI / 2;
    const ax = W/2 + Math.cos(angle) * r;
    const ay = H/2 + Math.sin(angle) * r;
    nodes.push({
      x: ax, y: ay,
      anchorX: ax, anchorY: ay,
      vx: 0, vy: 0,
      size: 20 * (game.size || 1),
      game: game,
      label: game.title,
      color: game.color
    });
  });

  // Add decorative nodes
  for (let i = 0; i < 25; i++) {
    nodes.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 2 + Math.random() * 4,
      game: null,
      label: '',
      color: '#222244'
    });
  }

  // Create edges (connections)
  edges = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < Math.min(W, H) * 0.4) {
        edges.push([i, j, dist]);
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw edges
  edges.forEach(([i, j, baseDist]) => {
    const a = nodes[i], b = nodes[j];
    const dx = a.x - b.x, dy = a.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const opacity = Math.max(0, 1 - dist / (Math.min(W, H) * 0.4)) * 0.15;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(0,255,66,${opacity})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach((n, i) => {
    const isHover = n === hoverNode;
    const isSelected = n === selectedNode;

    // Glow for game nodes
    if (n.game && n.game.url) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size + (isHover ? 15 : 8), 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(n.x, n.y, n.size, n.x, n.y, n.size + (isHover ? 15 : 8));
      grad.addColorStop(0, n.color + (isHover ? '40' : '20'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#fff' : (isHover ? n.color : n.color + '80');
    ctx.fill();

    if (n.game && n.game.url) {
      ctx.strokeStyle = n.color;
      ctx.lineWidth = isHover ? 2 : 1;
      ctx.stroke();
    }

    // Label
    if (n.label && n.size > 5) {
      ctx.font = `${isHover ? 700 : 600} ${isHover ? 14 : 11}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.fillStyle = isHover ? '#fff' : '#c8c8d8';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.size + 18);
    }
  });

  // Animate decorative nodes
  nodes.forEach(n => {
    if (!n.game) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }
  });

  // Force repulsion between game nodes — prevent overlap
  const gameNodes = nodes.filter(n => n.game);
  for (let i = 0; i < gameNodes.length; i++) {
    for (let j = i + 1; j < gameNodes.length; j++) {
      const a = gameNodes[i], b = gameNodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = a.size + b.size + 60;
      if (dist < minDist && dist > 0.1) {
        const force = (minDist - dist) * 0.15;
        const nx = dx / dist, ny = dy / dist;
        a.x += nx * force;
        a.y += ny * force;
        b.x -= nx * force;
        b.y -= ny * force;
      }
    }
  }

  // Anchor spring — pull nodes back toward layout positions
  gameNodes.forEach((n, i) => {
    if (n.anchorX != null) {
      n.x += (n.anchorX - n.x) * 0.01;
      n.y += (n.anchorY - n.y) * 0.01;
    }
  });

  // Keep game nodes within viewport
  const pad = 60;
  gameNodes.forEach(n => {
    n.x = Math.max(pad + n.size, Math.min(W - pad - n.size, n.x));
    n.y = Math.max(pad + n.size, Math.min(H - pad - n.size, n.y));
  });

  // Gentle attraction to mouse for game nodes (desktop only)
  if (mouse.active) {
    nodes.forEach(n => {
      if (n.game) {
        const dx = mouse.x - n.x, dy = mouse.y - n.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200 && dist > 0) {
          n.x += dx * 0.002;
          n.y += dy * 0.002;
        }
      }
    });
  }

  requestAnimationFrame(draw);
}

function getNodeAt(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (dx*dx + dy*dy < (n.size + 10) * (n.size + 10) && n.game) {
      return n;
    }
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  const n = getNodeAt(e.clientX, e.clientY);
  hoverNode = n;
  canvas.style.cursor = n ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n && n.game) {
    selectedNode = n;
    showPanel(n.game);
  }
});

// Touch support for mobile
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const n = getNodeAt(t.clientX, t.clientY);
  if (n && n.game) {
    selectedNode = n;
    showPanel(n.game);
  }
}, {passive: false});

let currentGame = null;
function showPanel(game) {
  currentGame = game;
  document.getElementById('panelTitle').textContent = game.title;
  document.getElementById('panelDesc').textContent = game.desc;
  document.getElementById('panelTags').innerHTML = game.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('panelPlay').textContent = game.url ? 'Play' : 'Coming Soon';
  document.getElementById('panelPlay').disabled = !game.url;
  document.getElementById('panelPlay').style.opacity = game.url ? 1 : 0.3;
  document.getElementById('panel').classList.add('show');
  document.getElementById('hint').style.display = 'none';
}

function closePanel() {
  document.getElementById('panel').classList.remove('show');
  selectedNode = null;
}

function launchGame() {
  if (currentGame && currentGame.url) {
    window.location.href = currentGame.url;
  }
}

function filterGames() {
  const q = document.getElementById('search').value.toLowerCase();
  nodes.forEach(n => {
    if (n.game) {
      const match = !q || n.game.title.toLowerCase().includes(q) || n.game.tags.some(t => t.includes(q));
      n.size = match ? 20 * (n.game.size || 1) : 4;
      n.color = match ? n.game.color : '#222244';
    }
  });
}

window.addEventListener('resize', resize);
resize();
draw();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
</script>
</body>
</html>
