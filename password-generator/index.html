<!-- EVEY NAV END --><div class="app">
<h1>Password <em>Generator</em></h1>
<div class="mode-tabs">
<button class="mode-tab active" onclick="setMode('random')">Random</button>
<button class="mode-tab" onclick="setMode('passphrase')">Passphrase</button>
<button class="mode-tab" onclick="setMode('pin')">PIN</button>
</div>
<div class="output">
<div class="password" id="password" onclick="copyPassword()"></div>
<div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
<div class="strength-label" id="strength-label"></div>
<div class="actions">
<button class="btn btn-primary" onclick="generate()">Generate</button>
<button class="btn btn-ghost" onclick="copyPassword()">Copy</button>
</div>
</div>
<div class="controls" id="controls"></div>

<div class="history-title">Recent</div>
<div id="hist-list"></div>
</div>

<footer class="footer"><div class="footer-links"><a href="https://evey.cc">Home</a><a href="https://evey.cc/shop">Donate</a><a href="https://habits.evey.cc">Habits</a><a href="https://github.com/42-evey">GitHub</a></div><div class="footer-copy">evey.cc — Generated locally. Nothing sent anywhere.</div></footer>
<div class="toast" id="toast"></div>
<script>
let mode='random',history=JSON.parse(localStorage.getItem('evey-pass-history')||'[]');
const WORDS=['alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet','kilo','lima','mike','november','oscar','papa','quebec','romeo','sierra','tango','uniform','victor','whiskey','xray','yankee','zulu','anchor','beacon','cipher','drift','ember','frost','gamma','haven','iron','jade','knight','lunar','matrix','nexus','orbit','prism','quartz','raven','shadow','thunder','unity','vortex','warden','xenon','yield','zenith','atlas','blade','coral','dusk','eagle','flame','grove','hollow','ivory','jasper','karma','light','meadow','noble','opal','pearl','quest','ridge','storm','terra','ultra','vale','wolf','apex','bolt','crest','dawn'];
let cfg={len:16,upper:true,lower:true,digits:true,symbols:true,phraseWords:4,pinLen:6};

function renderControls(){
const c=document.getElementById('controls');
if(mode==='random'){c.innerHTML=`
<div class="control-row"><span class="control-label">Length</span><input class="control-input" type="number" value="${cfg.len}" min="8" max="128" onchange="cfg.len=+this.value;generate()"></div>
<div class="control-row"><span class="control-label">Uppercase (A-Z)</span><button class="toggle${cfg.upper?' on':''}" onclick="cfg.upper=!cfg.upper;this.classList.toggle('on');generate()"></button></div>
<div class="control-row"><span class="control-label">Lowercase (a-z)</span><button class="toggle${cfg.lower?' on':''}" onclick="cfg.lower=!cfg.lower;this.classList.toggle('on');generate()"></button></div>
<div class="control-row"><span class="control-label">Digits (0-9)</span><button class="toggle${cfg.digits?' on':''}" onclick="cfg.digits=!cfg.digits;this.classList.toggle('on');generate()"></button></div>
<div class="control-row"><span class="control-label">Symbols (!@#$)</span><button class="toggle${cfg.symbols?' on':''}" onclick="cfg.symbols=!cfg.symbols;this.classList.toggle('on');generate()"></button></div>`;
}else if(mode==='passphrase'){c.innerHTML=`<div class="control-row"><span class="control-label">Words</span><input class="control-input" type="number" value="${cfg.phraseWords}" min="3" max="10" onchange="cfg.phraseWords=+this.value;generate()"></div>`;
}else{c.innerHTML=`<div class="control-row"><span class="control-label">PIN Length</span><input class="control-input" type="number" value="${cfg.pinLen}" min="4" max="12" onchange="cfg.pinLen=+this.value;generate()"></div>`;}
}

function generate(){
let pw='';
if(mode==='random'){
let chars='';
if(cfg.upper)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
if(cfg.lower)chars+='abcdefghijklmnopqrstuvwxyz';
if(cfg.digits)chars+='0123456789';
if(cfg.symbols)chars+='!@#$%^&*_-+=?';
if(!chars)chars='abcdefghijklmnopqrstuvwxyz';
const arr=new Uint32Array(cfg.len);crypto.getRandomValues(arr);
pw=Array.from(arr,v=>chars[v%chars.length]).join('');
}else if(mode==='passphrase'){
const arr=new Uint32Array(cfg.phraseWords);crypto.getRandomValues(arr);
pw=Array.from(arr,v=>WORDS[v%WORDS.length]).join('-');
}else{
const arr=new Uint32Array(cfg.pinLen);crypto.getRandomValues(arr);
pw=Array.from(arr,v=>'0123456789'[v%10]).join('');
}
document.getElementById('password').textContent=pw;
updateStrength(pw);
addHistory(pw);
}

function updateStrength(pw){
let score=0,len=pw.length;
if(len>=8)score++;if(len>=12)score++;if(len>=16)score++;if(len>=24)score++;
if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))score++;
if(/\d/.test(pw))score++;
if(/[^a-zA-Z0-9]/.test(pw))score++;
if(mode==='passphrase')score=Math.min(7,cfg.phraseWords+2);
if(mode==='pin')score=Math.min(3,Math.floor(cfg.pinLen/2));
const pct=Math.min(100,score*14);
const colors=['var(--danger)','var(--danger)','var(--warn)','var(--warn)','var(--accent)','var(--accent)','var(--accent)','var(--accent)'];
const labels=['Very Weak','Weak','Fair','Fair','Strong','Very Strong','Excellent','Excellent'];
const fill=document.getElementById('strength-fill');
fill.style.width=pct+'%';fill.style.background=colors[Math.min(score,7)];
const lbl=document.getElementById('strength-label');
lbl.textContent=labels[Math.min(score,7)];lbl.style.color=colors[Math.min(score,7)];
}

function copyPassword(){
const pw=document.getElementById('password').textContent;
if(pw)navigator.clipboard.writeText(pw).then(()=>toast('Copied'));
}

function addHistory(pw){
history=history.filter(h=>h!==pw);history.unshift(pw);history=history.slice(0,8);
localStorage.setItem('evey-pass-history',JSON.stringify(history));renderHistory();
}
function renderHistory(){
if(!history.length){document.getElementById('hist-section').style.display='none';return;}
document.getElementById('hist-section').style.display='block';
document.getElementById('hist-list').innerHTML=history.map(h=>`<div class="hist-item" onclick="navigator.clipboard.writeText('${h.replace(/'/g,"\\'")}').then(()=>toast('Copied'))">${h}</div>`).join('');
}

function setMode(m){mode=m;document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['random','passphrase','pin'][i]===m));renderControls();generate();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
renderControls();generate();renderHistory();
</script>
