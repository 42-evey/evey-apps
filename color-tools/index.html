*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface-hover:#1a1a2e;--accent:#00ff42;--accent-hover:#00cc35;--accent-dim:rgba(0,255,66,0.1);--text:#f0f0f5;--text-sec:#c8c8d8;--text-dim:#8888a0;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);--dur:0.2s}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all var(--dur) var(--ease);border:none}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-sec);border:1px solid var(--border);padding:8px 14px;font-size:0.78rem}

.mode-btn{padding:8px 14px;border-radius:8px;font-size:0.72rem;font-weight:600;color:var(--text-sec);cursor:pointer;transition:all var(--dur);border:none;background:transparent;font-family:var(--font)}
.mode-btn.active{color:#fff;background:rgba(255,255,255,0.1)}
.color-detail{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;text-align:left}
.color-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.color-row:last-child{border:none}
.color-key{color:var(--text-dim);font-size:0.72rem}
.color-val{font-family:var(--mono);color:var(--text);cursor:pointer;transition:color var(--dur)}
.color-val:hover{color:var(--accent)}
.saved{margin-top:24px;text-align:left}

.saved-item{display:flex;gap:4px;margin-bottom:6px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid var(--border);height:36px}
.saved-swatch{flex:1;min-width:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:10px;font-size:0.82rem;font-weight:500;z-index:900;transition:transform 0.3s var(--ease);border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);max-width:600px;margin:0 auto;position:relative;z-index:1}
.footer-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}

@media(max-width:640px){
  
  .app{padding:24px 20px 80px}body{padding-bottom:64px}.footer{display:none}}

<!-- EVEY NAV END --><div class="app">
<h1>Color <em>Palette</em></h1>
<div class="modes">
<button class="mode-btn active" onclick="setMode('harmony')">Harmony</button>
<button class="mode-btn" onclick="setMode('random')">Random</button>
<button class="mode-btn" onclick="setMode('dark')">Dark Theme</button>
<button class="mode-btn" onclick="setMode('pastel')">Pastel</button>
<button class="mode-btn" onclick="setMode('mono')">Monochrome</button>
</div>
<div class="palette" id="palette"></div>
<div class="actions">
<button class="btn btn-primary" onclick="generate()">Generate</button>
<button class="btn btn-ghost" onclick="savePalette()">Save</button>
<button class="btn btn-ghost" onclick="exportCSS()">Copy CSS</button>
</div>
<div class="color-detail" id="detail" style="display:none"></div>

</div>

<footer class="footer"><div class="footer-links"><a href="https://evey.cc">Home</a><a href="https://evey.cc/shop">Donate</a><a href="https://habits.evey.cc">Habits</a><a href="https://github.com/42-evey">GitHub</a></div><div class="footer-copy">evey.cc — All data stays in your browser</div></footer>
<div class="toast" id="toast"></div>

<script>
let mode='harmony',colors=[],saved=JSON.parse(localStorage.getItem('evey-palettes')||'[]');

function hslToHex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return'#'+f(0)+f(8)+f(4)}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function generate(){
  const n=5;colors=[];
  if(mode==='harmony'){
    const base=randInt(0,360);const offsets=[0,30,60,180,210];
    colors=offsets.map(o=>hslToHex((base+o)%360,randInt(50,80),randInt(40,60)));
  }else if(mode==='random'){
    for(let i=0;i<n;i++)colors.push('#'+Array.from(crypto.getRandomValues(new Uint8Array(3)),b=>b.toString(16).padStart(2,'0')).join(''));
  }else if(mode==='dark'){
    const base=randInt(0,360);
    colors=[hslToHex(base,randInt(20,40),randInt(3,8)),hslToHex(base,randInt(20,40),randInt(8,15)),hslToHex(base,randInt(30,50),randInt(12,20)),hslToHex((base+120)%360,randInt(60,90),randInt(50,65)),hslToHex(base,randInt(10,20),randInt(85,95))];
  }else if(mode==='pastel'){
    for(let i=0;i<n;i++)colors.push(hslToHex(randInt(0,360),randInt(40,70),randInt(70,85)));
  }else if(mode==='mono'){
    const h=randInt(0,360);
    colors=[15,25,40,55,75].map(l=>hslToHex(h,randInt(20,50),l));
  }
  renderPalette();
}

function renderPalette(){
  document.getElementById('palette').innerHTML=colors.map((c,i)=>
    `<div class="swatch" style="background:${c}" onclick="showDetail(${i})"><span class="swatch-label">${c}</span></div>`
  ).join('');
  document.getElementById('detail').style.display='none';
}

function showDetail(i){
  const c=colors[i];const{r,g,b}=hexToRgb(c);
  document.getElementById('detail').innerHTML=`
    <div style="width:100%;height:48px;border-radius:8px;background:${c};margin-bottom:12px"></div>
    <div class="color-row"><span class="color-key">HEX</span><span class="color-val" onclick="copy('${c}')">${c}</span></div>
    <div class="color-row"><span class="color-key">RGB</span><span class="color-val" onclick="copy('rgb(${r},${g},${b})')">rgb(${r}, ${g}, ${b})</span></div>
    <div class="color-row"><span class="color-key">CSS</span><span class="color-val" onclick="copy('color: ${c};')">color: ${c};</span></div>
  `;
  document.getElementById('detail').style.display='block';
}

function copy(text){navigator.clipboard.writeText(text).then(()=>toast('Copied: '+text))}

function exportCSS(){
  const vars=colors.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n');
  const css=`:root {\n${vars}\n}`;
  navigator.clipboard.writeText(css).then(()=>toast('CSS variables copied'));
}

function savePalette(){
  saved.unshift([...colors]);saved=saved.slice(0,10);
  localStorage.setItem('evey-palettes',JSON.stringify(saved));
  renderSaved();toast('Palette saved');
}

function loadPalette(i){colors=[...saved[i]];renderPalette()}

function renderSaved(){
  if(!saved.length){document.getElementById('saved-section').style.display='none';return}
  document.getElementById('saved-section').style.display='block';
  document.getElementById('saved-list').innerHTML=saved.map((p,i)=>
    `<div class="saved-item" onclick="loadPalette(${i})">${p.map(c=>`<div class="saved-swatch" style="background:${c}"></div>`).join('')}</div>`
  ).join('');
}

function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['harmony','random','dark','pastel','mono'][i]===m));generate()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
generate();renderSaved();
</script>
</body>
