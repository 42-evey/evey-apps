<h1>Unit <em>Converter</em></h1>

<div class="input-row"><input id="val1" type="number" value="1" oninput="convert('from')"><select id="unit1" onchange="convert('from')"></select></div>

<div class="input-row"><input id="val2" type="number" oninput="convert('to')"><select id="unit2" onchange="convert('from')"></select></div>

<script>
const UNITS={
  Length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254},
  Weight:{kg:1,g:0.001,mg:0.000001,lb:0.453592,oz:0.0283495,t:1000},
  Temperature:{C:'c',F:'f',K:'k'},
  Data:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776,bit:0.125},
  Time:{s:1,ms:0.001,min:60,hr:3600,day:86400,week:604800,year:31536000},
  Speed:{'m/s':1,'km/h':0.277778,'mph':0.44704,knot:0.514444}
};
let cat='Length';

function renderCats(){
  document.getElementById('cats').innerHTML=Object.keys(UNITS).map(c=>
    `<button class="cat${c===cat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c){
  cat=c;renderCats();
  const units=Object.keys(UNITS[cat]);
  const s1=document.getElementById('unit1'),s2=document.getElementById('unit2');
  s1.innerHTML=units.map(u=>`<option value="${u}">${u}</option>`).join('');
  s2.innerHTML=units.map(u=>`<option value="${u}">${u}</option>`).join('');
  if(units.length>1)s2.selectedIndex=1;
  convert('from');
}

function convert(dir){
  const v1=document.getElementById('val1'),v2=document.getElementById('val2');
  const u1=document.getElementById('unit1').value,u2=document.getElementById('unit2').value;
  const val=parseFloat(dir==='from'?v1.value:v2.value)||0;

  let result;
  if(cat==='Temperature'){
    if(dir==='from')result=convertTemp(val,u1,u2);
    else result=convertTemp(val,u2,u1);
  }else{
    const factors=UNITS[cat];
    if(dir==='from')result=val*factors[u1]/factors[u2];
    else result=val*factors[u2]/factors[u1];
  }

  if(dir==='from')v2.value=formatNum(result);
  else v1.value=formatNum(result);

  document.getElementById('result').textContent=`${formatNum(parseFloat(v1.value))} ${u1} = ${formatNum(parseFloat(v2.value))} ${u2}`;
  document.getElementById('formula').textContent=`1 ${u1} = ${formatNum(cat==='Temperature'?convertTemp(1,u1,u2):UNITS[cat][u1]/UNITS[cat][u2])} ${u2}`;
}

function convertTemp(val,from,to){
  let c;
  if(from==='C')c=val;else if(from==='F')c=(val-32)*5/9;else c=val-273.15;
  if(to==='C')return c;if(to==='F')return c*9/5+32;return c+273.15;
}

function formatNum(n){
  if(Number.isInteger(n))return n.toString();
  const s=n.toPrecision(10);
  return parseFloat(s).toString();
}

function swap(){
  const s1=document.getElementById('unit1'),s2=document.getElementById('unit2');
  const tmp=s1.selectedIndex;s1.selectedIndex=s2.selectedIndex;s2.selectedIndex=tmp;
  convert('from');
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
renderCats();setCat('Length');
</script>
